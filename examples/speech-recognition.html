<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>webml-utils: speech recognition</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #0a0a0f; color: #e0e0e0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
    h1 { font-size: 1.4rem; margin-bottom: 8px; color: #fff; }
    .subtitle { font-size: 0.85rem; color: #888; margin-bottom: 24px; }
    #status { font-size: 0.8rem; color: #a78bfa; margin-bottom: 20px; min-height: 20px; }
    .controls { display: flex; gap: 12px; margin-bottom: 24px; }
    button { padding: 12px 24px; background: #a78bfa; color: #000; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.9rem; }
    button:hover { background: #c4b5fd; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    button.recording { background: #ef4444; color: #fff; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    .drop-zone { width: 100%; max-width: 500px; min-height: 80px; border: 2px dashed #333; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; margin-bottom: 24px; padding: 16px; font-size: 0.85rem; color: #555; }
    .drop-zone:hover { border-color: #a78bfa; }
    .transcript { width: 100%; max-width: 500px; min-height: 120px; background: #111118; border: 1px solid #222; border-radius: 8px; padding: 16px; font-size: 0.95rem; line-height: 1.6; white-space: pre-wrap; }
    .transcript:empty::before { content: 'transcription will appear here...'; color: #444; }
    input[type="file"] { display: none; }
    .progress-wrap { width: 100%; max-width: 500px; margin-bottom: 16px; }
    .progress-bar { width: 100%; height: 6px; background: #222; border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #7c3aed, #a78bfa); width: 0%; transition: width 0.3s; }
    .progress-text { font-size: 0.72rem; color: #666; font-family: monospace; margin-top: 4px; text-align: center; min-height: 16px; }
    .or { color: #444; font-size: 0.8rem; margin-bottom: 12px; }
  </style>
</head>
<body>
  <h1>speech recognition</h1>
  <p class="subtitle">record from mic or drop an audio file — transcribed locally via Whisper</p>
  <div id="status">loading model...</div>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
    <div class="progress-text" id="progressText"></div>
  </div>

  <div class="controls">
    <button id="recordBtn" disabled>hold to record</button>
  </div>

  <div class="or">or</div>

  <div class="drop-zone" id="dropZone">
    drop an audio file (.wav, .mp3, .m4a)
  </div>
  <input type="file" id="fileInput" accept="audio/*" />

  <div class="transcript" id="transcript"></div>

  <script type="module">
    const $ = id => document.getElementById(id);
    const status = $('status');
    const recordBtn = $('recordBtn');
    const dropZone = $('dropZone');
    const fileInput = $('fileInput');
    const transcript = $('transcript');
    const progress = $('progress');
    const progressText = $('progressText');

    function fmtSize(bytes) {
      if (bytes >= 1024 ** 3) return `${(bytes / 1024 ** 3).toFixed(1)} GB`;
      if (bytes >= 1024 ** 2) return `${(bytes / 1024 ** 2).toFixed(0)} MB`;
      if (bytes >= 1024) return `${(bytes / 1024).toFixed(0)} KB`;
      return `${bytes} B`;
    }

    const worker = new Worker('./worker.js', { type: 'module' });
    let ready = false;
    let mediaRecorder = null;
    let audioChunks = [];

    // -- Worker messages --
    worker.addEventListener('message', (e) => {
      const msg = e.data;

      switch (msg.type) {
        case 'device-info':
          worker.postMessage({
            type: 'load',
            config: {
              task: 'automatic-speech-recognition',
              modelId: 'onnx-community/whisper-tiny.en',
              dtype: 'q8',
              device: msg.data.backend,
            }
          });
          break;

        case 'progress': {
          const { status: st, percent, loaded, total } = msg.data;
          status.textContent = st === 'compiling' ? 'compiling shaders...' : `downloading: ${percent}%`;
          progress.style.width = `${percent}%`;
          progressText.textContent = (total > 0 && st !== 'compiling') ? `${fmtSize(loaded)} / ${fmtSize(total)}` : '';
          break;
        }

        case 'ready':
          status.textContent = 'ready — record or drop audio';
          ready = true;
          recordBtn.disabled = false;
          break;

        case 'result':
          status.textContent = 'done';
          const text = msg.data?.text ?? (Array.isArray(msg.data) ? msg.data[0]?.text : JSON.stringify(msg.data));
          transcript.textContent = text;
          break;

        case 'error':
          status.textContent = `error: ${msg.data}`;
          break;
      }
    });

    async function transcribeBlob(blob) {
      if (!ready) return;
      status.textContent = 'decoding audio...';
      transcript.textContent = '';

      try {
        // Decode on main thread (AudioContext doesn't exist in workers)
        const arrayBuffer = await blob.arrayBuffer();
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
        const decoded = await audioCtx.decodeAudioData(arrayBuffer);

        // Get mono channel at 16kHz (what Whisper expects)
        const pcm = decoded.getChannelData(0);

        // Transfer the buffer to the worker (zero-copy)
        worker.postMessage({
          type: 'run',
          id: `asr_${Date.now()}`,
          task: 'automatic-speech-recognition',
          input: pcm,
        }, [pcm.buffer]);

        status.textContent = 'transcribing...';
        audioCtx.close();
      } catch (err) {
        status.textContent = `audio decode error: ${err.message}`;
      }
    }

    // -- Microphone recording --
    recordBtn.addEventListener('mousedown', async () => {
      if (!ready) return;
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];

        mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
        mediaRecorder.onstop = () => {
          stream.getTracks().forEach(t => t.stop());
          const blob = new Blob(audioChunks, { type: 'audio/webm' });
          transcribeBlob(blob);
        };

        mediaRecorder.start();
        recordBtn.textContent = 'recording...';
        recordBtn.classList.add('recording');
      } catch (err) {
        status.textContent = `mic error: ${err.message}`;
      }
    });

    recordBtn.addEventListener('mouseup', () => {
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
        recordBtn.textContent = 'hold to record';
        recordBtn.classList.remove('recording');
      }
    });

    // -- File drop --
    dropZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => {
      if (e.target.files[0]) transcribeBlob(e.target.files[0]);
    });

    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.borderColor = '#a78bfa'; });
    dropZone.addEventListener('dragleave', () => { dropZone.style.borderColor = '#333'; });
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.style.borderColor = '#333';
      if (e.dataTransfer.files[0]) transcribeBlob(e.dataTransfer.files[0]);
    });

    // -- Init --
    worker.postMessage({ type: 'check' });
  </script>
</body>
</html>
